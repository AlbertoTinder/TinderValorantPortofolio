
<script>
const ov=document.getElementById('chess-ov');
for(let r=0;r<8;r++) for(let c=0;c<12;c++){const d=document.createElement('div');d.className='cc '+((r+c)%2===0?'l':'d');ov.appendChild(d);}

const API='https://media.valorant-api.com/agents/';
const layer=document.getElementById('agents-layer');
const mapImg=document.querySelector('.map-img');
const container=document.querySelector('.map-container');
let B={l:0,t:0,w:100,h:100};

function calcBounds(){
  const cW=container.offsetWidth,cH=container.offsetHeight;
  const iW=mapImg.naturalWidth||1200,iH=mapImg.naturalHeight||900;
  const iR=iW/iH,cR=cW/cH;
  let rW,rH;
  if(iR>cR){rW=cW;rH=cW/iR;}else{rH=cH;rW=cH*iR;}
  B.l=((cW-rW)/2/cW)*100;B.t=((cH-rH)/2/cH)*100;
  B.w=(rW/cW)*100;B.h=(rH/cH)*100;
}
function toC(ix,iy){return[B.l+ix*B.w/100,B.t+iy*B.h/100];}

const AGENTS=[
  {name:'CYPHER',   role:'Sentinel',   rc:'#4caf50',side:'ct',img:'cypher.png',         wps:[[15,15],[18,22],[12,12],[16,18]]},
  {name:'BRIMSTONE',role:'Controller', rc:'#5c9aff',side:'ct',img:API+'9f0d8ba9-4140-b941-57d3-a7ad57c6b417/displayicon.png',wps:[[42,12],[45,18],[40,22],[43,15]]},
  {name:'OMEN',     role:'Controller', rc:'#5c9aff',side:'ct',img:'omen.png',            wps:[[55,28],[52,22],[58,32],[54,26]]},
  {name:'KILLJOY',  role:'Sentinel',   rc:'#4caf50',side:'ct',img:API+'1dbf2edd-4729-0984-3115-daa5eed44993/displayicon.png',wps:[[80,15],[83,22],[78,12],[81,18]]},
  {name:'KAY/O',    role:'Initiator',  rc:'#ffc107',side:'ct',img:'kayo.png',            wps:[[68,32],[65,28],[72,36],[67,30]]},
  {name:'JETT',     role:'Duelist',    rc:'#ff4655',side:'t', img:API+'add6443a-41bd-e414-f6ad-e58d267f4e95/displayicon.png',wps:[[18,68],[22,62],[15,75],[20,66]]},
  {name:'SOVA',     role:'Initiator',  rc:'#ffc107',side:'t', img:'sova.png',            wps:[[45,72],[48,66],[42,78],[46,70]]},
  {name:'NEON',     role:'Duelist',    rc:'#ff4655',side:'t', img:'neon.png',            wps:[[77,66],[80,62],[74,72],[78,64]]},
  {name:'REYNA',    role:'Duelist',    rc:'#ff4655',side:'t', img:API+'a3bfb853-43b2-7238-a4f1-ad90e9e46bcc/displayicon.png',wps:[[12,82],[16,76],[10,86],[14,80]]},
  {name:'ASTRA',    role:'Controller', rc:'#5c9aff',side:'t', img:'astra.png',           wps:[[60,85],[57,80],[63,82],[59,87]]},
];

const pieceEls=[];
AGENTS.forEach(ag=>{
  ag.wpIdx=0;ag.alive=true;ag.cur=[...ag.wps[0]];
  const el=document.createElement('div');el.className='piece';
  const fb=ag.side==='ct'?'92,154,255':'255,70,85';
  el.innerHTML=`<div class="ptip">${ag.name} · ${ag.role}</div><div class="tile"></div>
    <div class="av ${ag.side}"><img src="${ag.img}" alt="${ag.name}"
      onerror="this.parentNode.innerHTML='<div style=\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:Teko,sans-serif;font-size:.9rem;color:rgba(255,255,255,.7);background:rgba(${fb},.18)\\'>${ag.name.slice(0,2)}</div>'">
    </div><div class="pname">${ag.name}</div><div class="rpip" style="background:${ag.rc}"></div>`;
  layer.appendChild(el);pieceEls.push(el);
});

function place(i){const[cx,cy]=toC(...AGENTS[i].cur);pieceEls[i].style.left=cx+'%';pieceEls[i].style.top=cy+'%';}
function init(){calcBounds();AGENTS.forEach((_,i)=>place(i));}
if(mapImg.complete)init();else mapImg.addEventListener('load',init);
window.addEventListener('resize',()=>{calcBounds();AGENTS.forEach((_,i)=>place(i));});

// Combat events: at turn N, T agent pushes toward CT agent, eliminates them
const COMBATS={
  12:{t:5,ct:0,push:[15,32],msg:'⚡ Jett flanks A — Cypher eliminated!'},
  18:{t:7,ct:4,push:[68,44],msg:'⚡ Neon pushes B — Kay/O eliminated!'},
  24:{t:6,ct:2,push:[50,38],msg:'⚡ Sova catches Omen mid!'},
  30:{t:8,ct:3,push:[80,32],msg:'⚡ Reyna takes B — Killjoy eliminated!'},
  36:{t:9,ct:1,push:[42,24],msg:'⚡ Astra smokes — Brimstone eliminated!'},
};

function showX(ix,iy,loserEl){
  const[cx,cy]=toC(ix,iy);
  const m=document.createElement('div');
  m.style.cssText=`position:absolute;left:${cx}%;top:${cy}%;transform:translate(-50%,-50%);
    font-size:2.4rem;color:#ff4655;text-shadow:0 0 20px #ff4655,0 0 40px #ff4655;
    font-family:Teko,sans-serif;font-weight:700;z-index:50;pointer-events:none;
    animation:xi .35s ease-out forwards;`;
  m.textContent='✕';layer.appendChild(m);
  loserEl.style.transition='opacity .5s .5s,transform .5s .5s';
  loserEl.style.opacity='0';loserEl.style.transform='translate(-50%,-50%) scale(0)';
  setTimeout(()=>m.remove(),2200);
}

const TURN_ORDER=[0,5,1,6,2,7,3,8,4,9];
let turnIdx=0;
const turnDot=document.getElementById('turn-dot');
const turnName=document.getElementById('turn-name');
const moveTrail=document.getElementById('move-trail');

function doTurn(){
  pieceEls.forEach(el=>el.classList.remove('active'));
  const ev=COMBATS[turnIdx];
  if(ev&&AGENTS[ev.t].alive&&AGENTS[ev.ct].alive){
    AGENTS[ev.t].cur=ev.push;place(ev.t);pieceEls[ev.t].classList.add('active');
    turnName.style.color='#ff4655';turnName.textContent=AGENTS[ev.t].name+' — COMBAT!';
    setTimeout(()=>{
      AGENTS[ev.ct].alive=false;showX(...ev.push,pieceEls[ev.ct]);
      moveTrail.textContent=ev.msg;moveTrail.style.color='#ff4655';
      setTimeout(()=>moveTrail.style.color='',2200);
    },900);
    turnIdx++;setTimeout(doTurn,3000);return;
  }
  for(let i=0;i<TURN_ORDER.length;i++){
    const ai=TURN_ORDER[turnIdx%TURN_ORDER.length];turnIdx++;
    const ag=AGENTS[ai];if(!ag.alive)continue;
    ag.wpIdx=(ag.wpIdx+1)%ag.wps.length;ag.cur=[...ag.wps[ag.wpIdx]];
    place(ai);pieceEls[ai].classList.add('active');
    const ct=ag.side==='ct';
    turnDot.style.background=ct?'#5c9aff':'#ff4655';
    turnDot.style.boxShadow=`0 0 8px ${ct?'#5c9aff':'#ff4655'}`;
    turnName.style.color=ct?'#5c9aff':'#ff4655';
    turnName.textContent=ag.name+' — '+(ct?'CT':'T');
    moveTrail.textContent=ct?'Holding position...':'Pushing...';
    break;
  }
  const ctDead=AGENTS.slice(0,5).every(a=>!a.alive);
  const tDead=AGENTS.slice(5).every(a=>!a.alive);
  if(ctDead||tDead){
    moveTrail.textContent=ctDead?'🔴 T WIN — New round...':'🔵 CT WIN — New round...';
    moveTrail.style.color=ctDead?'#ff4655':'#5c9aff';
    setTimeout(reset,4500);return;
  }
  setTimeout(doTurn,2200);
}

function reset(){
  AGENTS.forEach((ag,i)=>{
    ag.alive=true;ag.wpIdx=0;ag.cur=[...ag.wps[0]];
    const el=pieceEls[i];
    el.style.opacity='1';el.style.transform='translate(-50%,-50%)';
    place(i);
  });
  turnIdx=0;moveTrail.style.color='';moveTrail.textContent='New round...';
  setTimeout(doTurn,1800);
}

setTimeout(doTurn,1400);

const ob=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');ob.unobserve(x.target);}});},{threshold:.1});
document.querySelectorAll('.rv').forEach(el=>ob.observe(el));
</script>
<style>@keyframes xi{from{opacity:0;transform:translate(-50%,-50%) scale(2.5);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}</style>
</body>
</html>
